{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ArtVault</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="{% static 'css/main.css' %}"/>
    <link rel="icon" type="image/webp" href="{% static 'images/temp-logo.webp' %}">

</head>
<body>
    {% if show_vault %}
    <div id="vault-overlay">
        <div class="vault-door">
            <div class="vault-half vault-left"></div>
            <div class="vault-half vault-right"></div>
            <div class="vault-center">
                <div class="vault-wheel"></div>
            </div>
        </div>
    </div>

    <style>
        #vault-overlay {
            position: fixed;
            inset: 0;
            z-index: 99999;
            pointer-events: none;
        }
        .vault-door {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        .vault-half {
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
            background: #2a2a2a;
            background-image: repeating-linear-gradient(
                90deg, transparent, transparent 40px, #1a1a1a 40px, #1a1a1a 42px
            );
            border: 4px solid #888;
            transition: transform 1.2s cubic-bezier(0.7, 0, 0.3, 1) 0.6s;
        }
        .vault-left  { left: 0;  transform-origin: left;  border-right: 2px solid #555; }
        .vault-right { right: 0; transform-origin: right; border-left:  2px solid #555; }
        .vault-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            transition: opacity 0.3s ease 0.5s;
        }
        .vault-wheel {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 8px solid #888;
            background: radial-gradient(circle, #3a3a3a, #1a1a1a);
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            animation: spin 0.8s ease-out 0.1s forwards;
            position: relative;
        }
        .vault-wheel::before {
            content: '';
            position: absolute;
            inset: 10px;
            border-radius: 50%;
            border: 4px solid #666;
        }
        .vault-wheel::after {
            content: '';
            position: absolute;
            top: 50%; left: 0; right: 0;
            height: 4px;
            background: #666;
            transform: translateY(-50%);
            box-shadow: 0 -20px 0 #666, 0 20px 0 #666;
        }
        .open .vault-left  { transform: perspective(1200px) rotateY(-110deg); }
        .open .vault-right { transform: perspective(1200px) rotateY(110deg); }
        .open .vault-center { opacity: 0; }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }
    </style>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.querySelector('.vault-door').classList.add('open');
            }, 100);
            setTimeout(() => {
                document.getElementById('vault-overlay').remove();
            }, 1800);
        });
    </script>
    {% endif %}
    {% include "_navigation.html" %}

    {% if messages %}
    <div class="position-fixed top-0 start-50 translate-middle-x mt-3" style="z-index: 9999;">
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show shadow" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    </div>
    {% endif %}

    {% block content %}

    {% endblock %}
    {% include "footer.html" %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const tooltips = document.querySelectorAll('[data-bs-toggle="tooltip"]')
            tooltips.forEach(el => new bootstrap.Tooltip(el))
        })
    </script>
</body>
</html>
