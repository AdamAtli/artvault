{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ArtVault</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="{% static 'css/main.css' %}"/>
    <link rel="stylesheet" href="{% static 'css/nav_drop.css' %}"/>
    <link rel="stylesheet" href="{% static 'css/seller.css' %}"/>
    <link rel="stylesheet" href="{% static 'css/user.css' %}"/>
    <link rel="icon" type="image/webp" href="{% static 'images/temp-logo.webp' %}">

</head>
<body>
    {% if show_vault %}
    <div id="vault-overlay">
        <div class="vault-door">
            <div class="vault-half vault-left"></div>
            <div class="vault-half vault-right"></div>
            <div class="vault-center">
                <div class="vault-wheel"></div>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.querySelector('.vault-door').classList.add('open');
            }, 100);
            setTimeout(() => {
                document.getElementById('vault-overlay').remove();
            }, 1800);
        });
    </script>
    {% endif %}
    {% include "_navigation.html" %}

    {% if messages %}
    <div class="position-fixed top-0 start-50 translate-middle-x mt-3" style="z-index: 9999;">
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show shadow" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    </div>
    {% endif %}

    {% block content %}

    {% endblock %}
    {% include "footer.html" %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const tooltips = document.querySelectorAll('[data-bs-toggle="tooltip"]')
            tooltips.forEach(el => new bootstrap.Tooltip(el))
        })
    </script>

    <script>
        let lastScroll = 0;

        const navbar = document.querySelector('.custom-navbar');
        window.addEventListener('scroll', () => {
            const currentScroll = window.pageYOffset;

            if (currentScroll <= 0) {
                navbar.classList.remove('nav-hidden');
                return;
            }

            if (currentScroll > lastScroll && !navbar.classList.contains('nav-hidden')) {
                navbar.classList.add('nav-hidden');

            } else if (currentScroll < lastScroll && navbar.classList.contains('nav-hidden')) {
                navbar.classList.remove('nav-hidden');
            }

            lastScroll = currentScroll;
        });
    </script>
</body>
</html>
