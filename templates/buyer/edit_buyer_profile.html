{% extends "base.html" %}

{% block content %}

<div class="user-detail-page">

    <div style="height: 90px;"></div>

    <div class ="user-detail-profile-wrapper">

        <div class="user-detail-profile-card">

            {% if buyer.profile_pic %}
                <img src="{{ buyer.profile_pic.url }}"
                     class="user-detail-logo">
            {% endif %}

        <div class="user-detail-info">

            <form method="POST"
                  enctype="multipart/form-data">

                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">
                        Full name
                    </label>
                    {{ form.full_name }}

                    {% if form.full_name.errors %}
                        <div class="text-danger">
                            {{ form.full_name.errors }}
                        </div>
                    {% endif %}
                </div>


                <div class="mb-3">
                    <label class="form-label">
                        Profile picture
                    </label>
                    {{ form.profile_pic }}
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        Bio
                    </label>
                    {{ form.bio }}
                </div>

                <button type="submit" class = "btn btn-dark">
                    Save changes
                </button>

            </form>

        </div>

        </div>

    </div>

</div>

{% endblock %}
