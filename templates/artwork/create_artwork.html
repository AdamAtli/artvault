{% extends 'base.html' %}

{% block content %}
    <div class="container mt-5">
        <div class="mx-auto" style="max-width: 600px;">
            <form method="post" enctype="multipart/form-data" action="{% url 'create-artwork' %}">
                {% csrf_token %}

                {{ form }}

                <div class="mb-3">
                    <label>
                        Add new medium
                    </label>

                    {{ form.new_medium }}
                </div>

                <div class="mb-3">
                    <label>
                        Add new style
                    </label>

                    {{ form.new_style }}
                </div>

                {{ image_form }}

                <input type="submit" class="btn btn-primary mt-3" value="Create" />
            </form>
        </div>
    </div>

{% endblock %}
