<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Artworks</title>
    <style>
        .artworks-container{
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        .artwork-item{
            padding: 10px;
            background-color: lightslategray;
        }
        .artwork-item h3{

        }
        .artwork-item .image{
            height: 150px;
            width: 150px;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
        }
        .artwork-item .badge {
            border-radius: 20px;
            padding: 10px;
            font-size: 1em;
            background-color: springgreen;
            max-width: 100px;
            text-align: center;
        }

        .red{
            background-color: red !important;
            color: white;
        }

        .seller{
            display:flex;
            align-items: center;
            gap:10px;
            margin-top: 10px;
        }

        .seller-image {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .seller-name {
            font-size: 1em;
        }
    </style>
</head>
<body>
    <div class="artworks-container">
        {% for artwork in artworks %}

            <div class="artwork-item">

                <a href="{% url 'artworks-detail' artwork.id %}">
                <div class="image" style="background-image: url('{{ artwork.image }}')"></div>
                <h3>{{artwork.title}}</h3>
                </a>

                <a href="{% url 'seller-detail' artwork.seller_id%}">
                    <div class="seller">
                        <div class="seller-image" style="background-image: url('{{ artwork.seller_logo }}')"></div>
                        <span class="seller-name">{{ artwork.seller_name }}</span>
                    </div>
                </a>

                <div>${{ artwork.starting_bid_price }}</div>
                {% if artwork.is_sold == False %}
                    <div class = "badge">Available!</div>
                {% else %}
                    <div class = "badge red">Sold</div>
                {% endif %}

            </div>

        {% endfor %}
    </div>
</body>
</html>
