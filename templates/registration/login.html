{% extends "base.html" %}

{% block content %}

<div class="container mt-5">
    <div class="card shadow-sm mx-auto" style="max-width: 500px;">
        <div class="card-body">

            <h2 class="mb-3 text-center">Log in</h2>

            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}

                {{ form }}

                <button type="submit" class="btn btn-dark w-100 mt-3">
                    Log in
                </button>

            </form>

        </div>
    </div>
</div>
{% endblock %}
