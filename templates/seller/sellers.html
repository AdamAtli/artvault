{% extends "base.html" %}

{% block content %}
<div class="container">
    {% for seller in sellers %}

        <div class="item">

            <a href="{% url 'seller-detail' seller.id %}">
            <img src="{{ seller.logo}}" class="seller-profile-logo" alt="seller-logo">
            <h3>{{seller.name}}</h3>
            </a>
            <div>{{ seller.seller_type }}</div>

        </div>

    {% endfor %}
</div>
{% endblock %}
